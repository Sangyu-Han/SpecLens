pack:
  setup: src.packs.dinov3.train.factories:setup_env

dataset:
  builder: src.packs.dinov3.train.factories:build_dataset
  root: /data/datasets/imagenet
  split: train
  batch_size: 32
  shuffle: true
  drop_last: true
  # DINOv3 pretrained with 256x256 (crop_pct=1.0)
  image_size: 256
  interpolation: bicubic
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  loader: src.packs.dinov3.train.factories:load_model
  name: vit_small_patch16_dinov3
  pretrained: true
  dtype: float32

logging:
  level: INFO
  log_dir: /home/sangyu/Desktop/Master/SpecLens/outputs/spec_lens_store/logs
  wandb:
    enabled: false
    mode: disabled
  log_every_steps: 500
  log_hist_every_steps: 5000
  upload_checkpoints: false

sae:
  dump_hook_points: false
  store:
    factory: src.packs.dinov3.train.factories:create_store
  layers:
    - model.blocks.2
    - model.blocks.6
    - model.blocks.10
  output:
    save_path: /home/sangyu/Desktop/Master/SpecLens/outputs/spec_lens_store/dinov3_50k_sae
  debug:
    sync_before_hook_copy: false
  training:
    num_training_steps: 50000
    ckpt_every_steps: 10000
    activation_batch_size: 4096
    n_batches_in_buffer: 2
    low_watermark_tokens: 4096
    high_watermark_tokens: 65536
    batches_per_collect_round: 2
    min_collect_batches_per_round: 1
    max_collect_batches_per_round: 4
    adaptive_collect: true
    sync:
      mode: owner_stream
      transfer_dtype: float16
      chunk_mb: 16
      max_chunk_mb: 32
      min_chunk_mb: 4
    queue:
      block_size_tokens: 16384
      in_memory_blocks_per_layer: 32
      spill_to_disk: false
    keep_last_ckpts: 3
    sae_type: batch-topk
    expansion_factor: 16
    k: 32
    k_aux: 128
    aux_frac: 0.03125
    lr: 1.0e-3
    l1_coeff: 0.0
    input_unit_norm: true
    n_batches_to_dead: 20
    dtype: float32
    seed: 42
    stride: 8

validation:
  enabled: false
