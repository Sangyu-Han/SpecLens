pack:
  setup: src.packs.siglip.train.factories:setup_env


dataset:
  builder: src.packs.siglip.train.factories:build_dataset
  root: /data/datasets/imagenet
  split: train
  batch_size: 32
  shuffle: true
  drop_last: true
  image_size: 224
  interpolation: bicubic
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]


model:
  loader: src.packs.siglip.train.factories:load_model
  name: vit_base_patch16_siglip_224
  pretrained: true
  dtype: float32


logging:
  level: INFO
  log_file: outputs/logs/siglip_imagenet_train.log
  wandb:
    enabled: true
    mode: online
    project: siglip-sae
    entity: null
    run_name: siglip-sae-batchtopk
    group: siglip-sae-batchtopk
    tags: [siglip-sae, batch-topk]
  log_every_steps: 100
  log_hist_every_steps: 10000
  upload_checkpoints: false


sae:
  store:
    factory: src.packs.siglip.train.factories:create_store
  layers:
    # low layer
    - model.blocks.2
    # middle layer
    - model.blocks.6
    # high layer (second-to-last; last is blocks.11)
    - model.blocks.10
  output:
    save_path: outputs/siglip_imagenet_sae_batchtopk
  debug:
    sync_before_hook_copy: false
  training:
    num_training_steps: 10000000
    ckpt_every_steps: 50000
    activation_batch_size: 4096
    n_batches_in_buffer: 2
    low_watermark_tokens: 4096
    high_watermark_tokens: 65536
    batches_per_collect_round: 2
    min_collect_batches_per_round: 1
    max_collect_batches_per_round: 4
    adaptive_collect: true
    sync:
      mode: owner_stream
      transfer_dtype: float16
      chunk_mb: 32
      max_chunk_mb: 64
      min_chunk_mb: 4
    queue:
      block_size_tokens: 16384
      in_memory_blocks_per_layer: 32
      spill_to_disk: false
    sae_type: batch-topk
    expansion_factor: 16
    k: 32
    k_aux: 128
    aux_frac: 0.03125
    lr: 1.0e-3
    l1_coeff: 0.0
    input_unit_norm: true
    n_batches_to_dead: 20
    dtype: float32
    seed: 42
    stride: 8


validation:
  enabled: true
  every_steps: 50000
  max_batches: 256
  max_tokens_per_layer: 1000000
  cache_batch_tokens: 4096
  eval_batch_tokens: 4096
  per_rank: true
  dataset:
    builder: src.packs.siglip.train.factories:build_dataset
    root: /data/datasets/imagenet
    split: val
    batch_size: 64
    shuffle: true
    drop_last: false
    image_size: 224
    is_train: false
    interpolation: bicubic
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
