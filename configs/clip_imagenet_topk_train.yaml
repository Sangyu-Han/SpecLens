pack:
  setup: src.packs.clip.train.factories:setup_env


dataset:
  builder: src.packs.clip.train.factories:build_dataset
  root: /home/mipal/data2/data/ILSVRC2012
  split: train
  batch_size: 32
  shuffle: true
  drop_last: true
  image_size: 224
  interpolation: bicubic
  mean: [0.48145466, 0.4578275, 0.40821073]
  std: [0.26862954, 0.26130258, 0.27577711]

model:
  loader: src.packs.clip.train.factories:load_model
  name: vit_base_patch16_clip_224.openai
  pretrained: true
  dtype: float32

logging:
  level: INFO
  log_file: outputs/logs/clip_topk_train.log
  wandb:
    enabled: false        # wandb 없어도 동작, 나중에 true로
    mode: offline
    project: clip-sae
    entity: null
    run_name: clip-topk-vitb16-allblocks
    group: clip-topk-allblocks
    tags: [clip-sae, topk, saelens-style]
  log_every_steps: 100
  log_hist_every_steps: 5000
  upload_checkpoints: false

sae:
  store:
    factory: src.packs.clip.train.factories:create_store
  layers:
    - model.blocks.0
    - model.blocks.1
    - model.blocks.2
    - model.blocks.3
    - model.blocks.4
    - model.blocks.5
    - model.blocks.6
    - model.blocks.7
    - model.blocks.8
    - model.blocks.9
    - model.blocks.10
    - model.blocks.11
  output:
    save_path: outputs/clip_imagenet_topk
  debug:
    sync_before_hook_copy: false
  training:
    num_training_steps: 200000
    ckpt_every_steps: 20000
    keep_last_ckpts: 3

    # ── activation buffer ──────────────────────────────────────────
    activation_batch_size: 4096
    n_batches_in_buffer: 2
    low_watermark_tokens: 4096
    high_watermark_tokens: 65536
    batches_per_collect_round: 2
    min_collect_batches_per_round: 1
    max_collect_batches_per_round: 4
    adaptive_collect: true

    # ── multi-GPU sync ─────────────────────────────────────────────
    # 이 서버는 NVLink P2P가 하드웨어 이슈로 비활성화됨.
    # mode: none → 각 GPU가 독립적으로 담당 레이어만 training
    #   GPU 0: blocks 0,2,4,6,8,10
    #   GPU 1: blocks 1,3,5,7,9,11
    sync:
      mode: none

    queue:
      block_size_tokens: 16384
      in_memory_blocks_per_layer: 16
      spill_to_disk: false
      mix_buffer_batches: 8
      mix_fraction: 0.5
      diversity:
        enabled: true
        k: 64
        resample_every: 5

    # ── SAE type: TopK (SAELens-style) ─────────────────────────────
    sae_type: topk
    expansion_factor: 32        # 768 * 32 = 24576 features
    k: 64                       # SAELens 권장 range (50-100) for ViT-B
    k_aux: 512                  # dead feature recovery top-k
    aux_penalty: 0.03125        # aux loss weight (1/32, SAELens default)
    l1_coeff: 0.0               # TopK은 L1 불필요

    # ── normalization (SAELens expected_average_only_in 방식에 가장 가까운 설정)
    input_unit_norm: true       # per-token mean/std normalize
    input_global_center_norm: false

    # ── LR schedule ────────────────────────────────────────────────
    lr: 2.0e-4                  # SAELens ViT 권장 lr
    lr_final: 2.0e-5            # 10% of base
    warmup_steps: 1000

    # ── dead feature tracking ──────────────────────────────────────
    n_batches_to_dead: 20
    freq_ema_decay: 0.999

    dtype: float32
    seed: 42
    stride: 8

# ── validation (rel_l2 모니터링) ──────────────────────────────────
# max_tokens_per_layer를 작게 유지해야 gloo P2P 전송이 안 터짐 (~32MB/layer)
# 768dim * float32 * max_tokens = 32MB → max_tokens ≈ 10922 → 10000으로 설정
validation:
  enabled: true
  every_steps: 20000
  max_batches: 16
  max_tokens_per_layer: 10000
  cache_batch_tokens: 4096
  eval_batch_tokens: 4096
  per_rank: true
  dataset:
    builder: src.packs.clip.train.factories:build_dataset
    root: /home/mipal/data2/data/ILSVRC2012
    split: val
    batch_size: 64
    shuffle: false
    drop_last: false
    image_size: 224
    interpolation: bicubic
    mean: [0.48145466, 0.4578275, 0.40821073]
    std: [0.26862954, 0.26130258, 0.27577711]
